<!DOCTYPE html>

<html>

<head>
    <title>SafeCampus</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

     <div class="navbar">

            <div class="logo-icon">🛡️</div>

                <h2>
                    SAFE CAMPUS
                </h2>
                <P>Speak Up.Stay Safe.</P>
            </div>
         </div>
        
     </div>
    <div class="blur-overlay"></div>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <div class="container">

        <p>Your Safety,Our Priority</p>

    <form>
        <textarea id="description" placeholder="📝Enter Description"></textarea><br>
        <button type="submit" id="submitBtn">Submit</button>
        <button type="button" id="locationBtn" onclick="enableManual()">🏠
Change Location</button>
    </form>

    </div>
    <small>🔒Your identity will remain anonymous</small>
    </div>
    <script type="module" src="script.js">

    </script>
